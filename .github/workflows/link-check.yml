name: Link Check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run to catch links that rot over time
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200..=204,403,429
            --timeout 20
            --max-retries 3
            --exclude-path node_modules
            './**/*.md'
          fail: false

      - name: Open issue on broken links (scheduled runs only)
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Link checker found broken links'
          content-filepath: ./lychee/out.md
          labels: broken-link, automated
