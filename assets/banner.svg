<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-label="Awesome Presentation Generation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="55%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" rx="16" fill="url(#bg)"/>

  <!-- Decorative slide stack -->
  <g transform="translate(880,60) rotate(4)">
    <rect x="24" y="24" width="220" height="150" rx="10" fill="#ffffff" opacity="0.10"/>
    <rect x="12" y="12" width="220" height="150" rx="10" fill="#ffffff" opacity="0.18"/>
    <rect x="0" y="0" width="220" height="150" rx="10" fill="#ffffff" opacity="0.92"/>
    <rect x="18" y="20" width="120" height="14" rx="7" fill="#4c1d95"/>
    <rect x="18" y="48" width="184" height="8" rx="4" fill="#c7d2fe"/>
    <rect x="18" y="64" width="160" height="8" rx="4" fill="#c7d2fe"/>
    <rect x="18" y="88" width="82" height="44" rx="6" fill="url(#accent)" opacity="0.85"/>
    <rect x="112" y="88" width="90" height="8" rx="4" fill="#ddd6fe"/>
    <rect x="112" y="104" width="72" height="8" rx="4" fill="#ddd6fe"/>
    <rect x="112" y="120" width="80" height="8" rx="4" fill="#ddd6fe"/>
  </g>

  <!-- Sparkle -->
  <g fill="#e879f9">
    <path d="M846 52 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z" opacity="0.9"/>
    <path d="M872 128 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z" opacity="0.7"/>
  </g>

  <text x="72" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff">Awesome</text>
  <text x="72" y="172" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="url(#accent)">Presentation Generation</text>
  <text x="72" y="216" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#c7d2fe">Papers · Datasets · Open-Source Projects · Products — for AI slide &amp; poster generation</text>
</svg>
